<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Contact · Feelix</title>
    <style>
        :root {
            --yellow: #facc15;
            --green: #4ade80;
            --glass-bg: rgba(18, 18, 28, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius: 24px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: #f1f5f9;
            background: #0a0a14;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* Background layers */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }
        .bg-image {
            position: absolute;
            inset: 0;
            background: url("robot.jpg") no-repeat center center/cover;
            opacity: 0.35;
            filter: saturate(0.6) brightness(0.45);
        }
        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(22,18,35,0.75) 0%, #050510 90%);
        }
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--yellow);
            opacity: 0;
            animation: floatUp var(--dur) var(--delay) infinite ease-in;
            will-change: transform, opacity;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.7; }
            25% { transform: translateY(70vh) translateX(var(--drift)) scale(var(--size)); opacity: 0.5; }
            50% { transform: translateY(38vh) translateX(calc(var(--drift)*0.3)) scale(calc(var(--size)*0.7)); opacity: 0.25; }
            75% { transform: translateY(12vh) translateX(calc(var(--drift)*-0.4)) scale(calc(var(--size)*0.4)); opacity: 0.08; }
            100% { transform: translateY(-10vh) translateX(0) scale(0); opacity: 0; }
        }

        .wrapper {
            max-width: 880px;
            margin: 0 auto;
            padding: 0 24px 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar with three‑dot menu */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0 10px;
            position: relative;
            z-index: 10;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: white;
            text-shadow: 0 4px 20px rgba(250,204,21,0.35);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-emoji {
            display: inline-block;
            animation: botBounce 2.2s ease-in-out infinite;
        }
        @keyframes botBounce {
            0%,100%{ transform: translateY(0); }
            25% { transform: translateY(-4px); }
            45% { transform: translateY(0); }
            60% { transform: translateY(-2px); }
            75% { transform: translateY(0); }
        }

        /* Three-dot menu button */
        .menu-container { position: relative; z-index: 100; }
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: rgba(20,20,32,0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
            position: relative;
            z-index: 101;
            outline: none;
            padding: 0;
        }
        .menu-btn:hover {
            background: rgba(30,30,45,0.8);
            border-color: rgba(250,204,21,0.55);
            box-shadow: 0 0 28px rgba(250,204,21,0.35), 0 8px 20px rgba(0,0,0,0.5);
            transform: scale(1.04);
        }
        .menu-btn:active { transform: scale(0.92); transition: transform 0.1s; }
        .menu-btn:focus-visible { outline: 2px solid #facc15; outline-offset: 4px; }
        .dots-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            transition: gap 0.3s;
        }
        .dots-icon span {
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #f1f5f9;
            transition: all 0.3s;
            box-shadow: 0 0 6px rgba(250,204,21,0.3);
        }
        .menu-btn:hover .dots-icon span { background: #facc15; box-shadow: 0 0 10px rgba(250,204,21,0.7); }
        .menu-btn.active .dots-icon { gap: 6px; }
        .menu-btn.active .dots-icon span:nth-child(2) { opacity: 0.6; }

        .quick-dropdown {
            position: absolute;
            top: 58px;
            right: 0;
            background: rgba(14,14,26,0.94);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(250,204,21,0.3);
            border-radius: 20px;
            padding: 10px 8px;
            min-width: 200px;
            box-shadow: 0 28px 50px -12px rgba(0,0,0,0.75), 0 0 0 1px rgba(250,204,21,0.1);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-14px) scale(0.9);
            transition: all 0.28s cubic-bezier(0.22,0.9,0.36,1);
            pointer-events: none;
        }
        .quick-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            color: #e2e8f0;
            font-weight: 500;
            font-size: 1.05rem;
            text-decoration: none;
            transition: all 0.22s;
            border: 1px solid transparent;
        }
        .quick-link:hover {
            background: rgba(250,204,21,0.12);
            border-color: rgba(250,204,21,0.45);
            color: #facc15;
            transform: translateX(6px);
        }
        .quick-link .link-icon { font-size: 1.35rem; transition: transform 0.25s; display: inline-block; }
        .quick-link:hover .link-icon { transform: scale(1.25) rotate(-10deg); }
        .dropdown-note { font-size: 0.68rem; color: #777; text-align: right; margin-top: 8px; padding-right: 8px; }

        /* Content */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .contact-card {
            width: 100%;
            max-width: 460px;
            padding: 36px 28px;
            border-radius: 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 45px -10px rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .contact-card h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #fff 0%, #facc15 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subhead {
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 14px 18px;
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }
        .info-icon {
            font-size: 1.8rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(250,204,21,0.08);
            border-radius: 14px;
        }
        .info-text .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }
        .info-text .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
            word-break: break-word;
        }
        .info-text a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px dotted rgba(250,204,21,0.5);
        }
        .info-text a:hover { color: #facc15; }

        /* Two action buttons side by side */
        .action-row {
            display: flex;
            gap: 16px;
            margin-top: 30px;
        }
        .action-btn {
            flex: 1;
            padding: 16px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            color: white;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .whatsapp-btn {
            background: rgba(37, 211, 102, 0.2);
            border: 1.5px solid rgba(37, 211, 102, 0.5);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.15);
        }
        .whatsapp-btn:hover {
            background: rgba(37, 211, 102, 0.4);
            border-color: #25d366;
            box-shadow: 0 0 28px rgba(37, 211, 102, 0.6);
            transform: translateY(-3px);
        }
        .call-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 1.5px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.15);
        }
        .call-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
            box-shadow: 0 0 28px rgba(59, 130, 246, 0.6);
            transform: translateY(-3px);
        }
        .action-btn span { font-size: 1.4rem; }

        .footer-note {
            text-align: center;
            margin-top: auto;
            padding: 24px 0 12px;
            color: #94a3b8;
            font-size: 0.9rem;
            border-top: 1px dashed rgba(250,204,21,0.15);
            animation: fadeInUp 1s ease;
        }

        @media (max-width: 500px) {
            .wrapper { padding: 0 14px 20px; }
            .logo { font-size: 24px; }
            .menu-btn { width: 44px; height: 44px; }
            .contact-card { padding: 28px 18px; }
            .action-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>
    </div>
    <div class="particles-container" id="particlesContainer" aria-hidden="true"></div>

    <div class="wrapper">
        <!-- Top bar with three‑dot menu -->
        <header class="top-bar">
            <div class="logo">
                <span>Feelix</span>
                <span class="logo-emoji">🤖</span>
            </div>
            <div class="menu-container" id="menuContainer">
                <button class="menu-btn" id="menuBtn" aria-label="Toggle menu" aria-haspopup="true" aria-expanded="false">
                    <span class="dots-icon" aria-hidden="true">
                        <span></span><span></span><span></span>
                    </span>
                </button>
                <nav class="quick-dropdown" id="quickDropdown" aria-label="Quick navigation">
                    <a href="index.html" class="quick-link"><span class="link-icon">🏠</span> Home</a>
                    <a href="order.html" class="quick-link"><span class="link-icon">📦</span> Order</a>
                    <a href="contact.html" class="quick-link"><span class="link-icon">💬</span> Contact</a>
                    <div class="dropdown-note">⚡ quick links</div>
                </nav>
            </div>
        </header>

        <!-- Main contact card -->
        <div class="content">
            <div class="contact-card">
                <h2>Let's talk</h2>
                <p class="subhead">We're real humans behind Feelix ✨</p>

                <div class="info-row">
                    <div class="info-icon">📱</div>
                    <div class="info-text">
                        <div class="label">Phone</div>
                        <div class="value"><a href="tel:+918133909528">+91 81339 09528</a></div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-icon">✉️</div>
                    <div class="info-text">
                        <div class="label">Email</div>
                        <div class="value"><a href="mailto:roboticsfeelix@gmail.com">roboticsfeelix@gmail.com</a></div>
                    </div>
                </div>

                <!-- LEFT: WhatsApp · RIGHT: Call -->
                <div class="action-row">
                    <a href="https://wa.me/918133909528" target="_blank" class="action-btn whatsapp-btn">
                        <span>💬</span> WhatsApp
                    </a>
                    <a href="tel:+918133909528" class="action-btn call-btn">
                        <span>📞</span> Call Now
                    </a>
                </div>
            </div>
        </div>

        <footer class="footer-note">
            © 2026 Feelix Robotics · your desk, alive ⚡
        </footer>
    </div>

    <script>
        (function() {
            // Floating particles
            const container = document.getElementById('particlesContainer');
            const count = 20;
            const frag = document.createDocumentFragment();
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1.5;
                p.style.cssText = `
                    --size: ${size}px;
                    --dur: ${Math.random() * 8 + 7}s;
                    --delay: ${Math.random() * 6}s;
                    --drift: ${(Math.random() - 0.5) * 60}px;
                    left: ${Math.random() * 90}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${Math.random() < 0.5 ? '#facc15' : '#4ade80'};
                `;
                frag.appendChild(p);
            }
            container.appendChild(frag);

            // Three-dot menu logic
            const menuBtn = document.getElementById('menuBtn');
            const dropdown = document.getElementById('quickDropdown');
            const menuContainer = document.getElementById('menuContainer');
            const quickLinks = dropdown.querySelectorAll('.quick-link');
            let isOpen = false;

            function openMenu() {
                isOpen = true;
                dropdown.classList.add('open');
                menuBtn.classList.add('active');
                menuBtn.setAttribute('aria-expanded', 'true');
            }
            function closeMenu() {
                isOpen = false;
                dropdown.classList.remove('open');
                menuBtn.classList.remove('active');
                menuBtn.setAttribute('aria-expanded', 'false');
            }

            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isOpen ? closeMenu() : openMenu();
            });
            document.addEventListener('click', (event) => {
                if (isOpen && !menuContainer.contains(event.target)) closeMenu();
            });
            quickLinks.forEach(link => link.addEventListener('click', closeMenu));
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isOpen) { closeMenu(); menuBtn.focus(); }
            });
            dropdown.addEventListener('click', e => e.stopPropagation());
        })();
    </script>
</body>
</html>
