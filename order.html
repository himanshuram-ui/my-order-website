<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Feelix</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:white;
  background: url("robot.jpg") no-repeat center center/cover;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.65);
  z-index:-1;
}

/* CENTER */
.container {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card {
  width:320px;
  padding:25px;
  border-radius:18px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* TITLE */
.card h2 {
  text-align:center;
  margin-bottom:20px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background: rgba(255,255,255,0.9);
  color:black;
}

/* PAYMENT */
.payment {
  margin-top:10px;
}

.payment p {
  margin-bottom:8px;
}

.payment label {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  cursor:pointer;
}

/* BUTTON */
.btn {
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  color:white;
  cursor:pointer;
  background: linear-gradient(135deg, #22c55e, #4ade80);
  box-shadow: 0 0 12px rgba(34,197,94,0.5);
  transition:0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(34,197,94,0.9);
}

.note {
  text-align:center;
  font-size:12px;
  color:#cbd5f5;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h2>Place Your Order</h2>

    <input type="text" id="name" placeholder="Enter your name">
    <input type="number" id="quantity" placeholder="Quantity">

    <div class="payment">
      <p>Select Payment Method:</p>

      <label>
        Cash on Delivery
        <input type="radio" name="pay" value="COD">
      </label>

      <label>
        UPI Payment
        <input type="radio" name="pay" value="UPI">
      </label>
    </div>

    <button class="btn" onclick="confirmOrder()">Confirm Order</button>

    <p class="note">Fast delivery • Secure payment</p>

  </div>

</div>

<script>
function confirmOrder(){

  let name = document.getElementById("name").value;
  let quantity = document.getElementById("quantity").value;
  let payment = document.querySelector("input[name='pay']:checked");

  if(name === "" || quantity === ""){
    alert("Please fill all details");
    return;
  }

  if(!payment){
    alert("Please select a payment method");
    return;
  }

  // SAVE DATA
  localStorage.setItem("name", name);
  localStorage.setItem("quantity", quantity);
  localStorage.setItem("payment", payment.value);

  function confirmOrder(){

  let name = document.getElementById("name").value;
  let quantity = document.getElementById("quantity").value;
  let payment = document.querySelector('input[name="payment"]:checked');

  if(name === "" || quantity === "" || !payment){
    alert("Please fill all details");
    return;
  }

  // SAVE DATA
  localStorage.setItem("name", name);
  localStorage.setItem("quantity", quantity);
  localStorage.setItem("payment", payment.value);

  // 🚀 DIRECT REDIRECT (NO POPUP)
  window.location.href = "payment.html";
}

  // REDIRECT
  window.location.href = "payment.html"; // change if needed


document.querySelector("button").innerText = "Processing...";
setTimeout(()=>{
  window.location.href = "payment.html";
}, 800);
}
</script>

</body>
</html>
