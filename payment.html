<!DOCTYPE html>
<html>
<head>
  <title>Payment - Feelix</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      color:white;
      text-align:center;
      background: url("robot.jpg") no-repeat center center/cover;
    }

    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.5);
      z-index:0;
    }

    .container{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      position:relative;
      z-index:1;
    }

    .card{
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding:20px;
      border-radius:14px;
      width:90%;
      max-width:320px;
      margin:auto;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .box{
      background: rgba(255,255,255,0.1);
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
      text-align:left;
      font-size:13px;
    }

    .total{
      color:#22c55e;
      font-weight:bold;
    }

    #qr{
      width:150px;
      margin:10px 0;
      border-radius:8px;
    }

    button{
      padding:8px 16px;
      border:none;
      border-radius:8px;
      background: linear-gradient(45deg,#22c55e,#4ade80);
      color:white;
      cursor:pointer;
      margin-top:10px;
    }

    .note{
      font-size:12px;
      color:#ccc;
      margin-top:10px;
      line-height:1.4;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Order Details</h2>

    <div class="box" id="bill"></div>

    <!-- UPI -->
    <div id="upiSection">
      <p>Scan & Pay</p>
      <img id="qr" src="UPI.jpeg">

      <p class="note">
        📌 After payment, please send the QR payment screenshot on WhatsApp to confirm your order.
      </p>
    </div>

    <button onclick="confirmOrder()">Confirm Order</button>
    <br>
    <button onclick="goBack()">⬅ Back</button>

  </div>
</div>

<script>

// GET DATA
let name = localStorage.getItem("name") || "Customer";
let quantity = parseInt(localStorage.getItem("quantity")) || 1;
let payment = localStorage.getItem("payment") || "UPI";

let price = 1000;
let total = quantity * price;

// SHOW BILL
document.getElementById("bill").innerHTML = `
Name: ${name}<br>
Quantity: ${quantity}<br>
<span class="total">Total: ₹${total}</span><br>
Payment: ${payment}
`;

// HIDE UPI IF COD
if(payment === "COD"){
  document.getElementById("upiSection").style.display = "none";
}

// CONFIRM ORDER
function confirmOrder(){

  let message = `New Order%0A
Name: ${name}%0A
Quantity: ${quantity}%0A
Total: ₹${total}%0A
Payment: ${payment}%0A
%0APlease send payment screenshot`;

  let phone = "918133909528";

  window.open(`https://wa.me/${phone}?text=${message}`);
}

// BACK
function goBack(){
  window.history.back();
}

</script>

</body>
</html>
