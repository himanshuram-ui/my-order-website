<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · Feelix</title>
  <style>
    /* ----- base & vibe (matches index/order) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      color: white;
      background: url("robot.jpg") no-repeat center center/cover;
      min-height: 100vh;
      position: relative;
    }

    /* dark overlay — exactly like order page */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    /* header (similar to index, but clean) */
    .top-header {
      text-align: center;
      padding: 25px 20px 5px;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      color: #facc15;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .top-header span {
      background: rgba(255,255,255,0.05);
      padding: 6px 18px;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      display: inline-block;
      border: 1px solid rgba(255,215,0,0.2);
    }

    /* simple nav links */
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 15px 0 5px;
    }

    .nav-links a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      padding: 5px 10px;
      border-radius: 30px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(6px);
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }

    .nav-links a:hover {
      color: #facc15;
      border-bottom: 2px solid #facc15;
      background: rgba(255,255,240,0.08);
    }

    /* center container — exactly like order card layout */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      padding: 20px;
    }

    /* glass card — identical to order card, slightly wider for contact */
    .contact-card {
      width: 380px;
      max-width: 94%;
      padding: 30px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .contact-card h2 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #facc15, #fde047);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    .subhead {
      color: #cbd5f5;
      margin-bottom: 30px;
      font-size: 15px;
      border-bottom: 1px dashed rgba(255,255,200,0.2);
      padding-bottom: 18px;
    }

    /* contact detail rows — clean, glassy */
    .detail-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      background: rgba(10, 10, 20, 0.25);
      backdrop-filter: blur(4px);
      padding: 16px 20px;
      border-radius: 60px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,240,0.08);
      transition: transform 0.2s;
    }

    .detail-item:hover {
      transform: scale(1.02);
      background: rgba(30, 30, 40, 0.4);
      border-color: rgba(250, 204, 21, 0.3);
    }

    .emoji-badge {
      font-size: 28px;
      background: rgba(255,215,0,0.1);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      backdrop-filter: blur(5px);
    }

    .detail-text {
      text-align: left;
    }

    .detail-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a5b4fc;
      font-weight: 400;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 700;
      color: white;
      word-break: break-word;
    }

    .detail-value a {
      color: white;
      text-decoration: none;
      border-bottom: 1px dotted #facc15;
    }

    .detail-value a:hover {
      color: #facc15;
    }

    /* action buttons — same gradient as order btn */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
      transition: all 0.25s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(250, 204, 21, 0.6);
      box-shadow: none;
      color: #facc15;
      backdrop-filter: blur(8px);
    }

    .btn-outline:hover {
      background: rgba(250, 204, 21, 0.12);
      border-color: #facc15;
      box-shadow: 0 0 18px #facc1540;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 25px #4ade80;
    }

    /* shiny animation on main button */
    .btn {
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-25deg);
    }

    .btn:hover::before {
      animation: shine 0.7s ease;
    }

    @keyframes shine {
      0% { left: -75%; }
      100% { left: 125%; }
    }

    /* footer note */
    .note {
      margin-top: 24px;
      font-size: 13px;
      color: #a0aec0;
    }

    .note i {
      color: #facc15;
    }

    /* responsive */
    @media (max-width: 420px) {
      .contact-card { padding: 24px 18px; }
      .detail-value { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- consistent header with Feelix branding -->
  <div class="top-header">
    <span>Feelix 🤖 · contact</span>
  </div>

  <!-- navigation (links to index & order) -->
  <div class="nav-links">

  <!-- main glass card container -->
  <div class="container">

      <!-- phone detail -->
      <div class="detail-item">
        <div class="emoji-badge">📱</div>
        <div class="detail-text">
          <div class="detail-label">call or whatsapp</div>
          <div class="detail-value">
            <a href="tel:+918133909528">+91 81339 09528</a>
          </div>
        </div>
      </div>

      <!-- email detail -->
      <div class="detail-item">
        <div class="emoji-badge">✉️</div>
        <div class="detail-text">
          <div class="detail-label">email support</div>
          <div class="detail-value">
            <a href="mailto:himanshuramchiary519@gmail.com">himanshuramchiary519@gmail.com</a>
          </div>
        </div>
      </div>

      <!-- tiny extra info: response time -->
      <p style="color:#b9c2da; margin: 10px 0 5px; font-size: 14px;">

      </p>

      <!-- action buttons: call now / order page -->
      <div class="btn-group">
        <a href="tel:+918133909528" class="btn">📞 Call now</a>

      </div>

      <!-- subtle note -->
      <div class="note">
        <i>✦</i>  feelix@desk  ·  secure & friendly  <i>✦</i>
      </div>
    </div>
  </div>

  <!-- tiny script to mimic smooth feel (optional, just for consistency) -->
  <script>
    // subtle: prefill any future contact? not needed.
    // just make sure the background image loads (same as order)
    console.log("📬 Contact Feelix · 8133909528");
  </script>
</body>
</html>
